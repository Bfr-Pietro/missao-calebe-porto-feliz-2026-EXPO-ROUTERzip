name: EAS Build (Android APK)

# Permite dois jeitos de disparar o build, os dois pelo navegador:
# 1) Automático a cada push na branch "main".
# 2) Manual: aba "Actions" do GitHub → "EAS Build (Android APK)" → "Run workflow".
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: "Perfil do eas.json a usar"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - production
          - development

jobs:
  build:
    name: Build Android APK on EAS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar EAS CLI
        run: npm install -g eas-cli

      - name: Instalar dependências do projeto
        run: npm install --legacy-peer-deps

      - name: Login no Expo/EAS via token
        run: echo "Usando EXPO_TOKEN configurado nos Secrets do repositório"

      - name: Disparar build na nuvem (EAS)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --no-wait
